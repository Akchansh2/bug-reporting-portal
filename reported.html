<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Bug Reported</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background: linear-gradient(135deg, #4fd1dc, #2b7cff 60%, #0b4fc2);
        color: #fff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .box {
        background: rgba(10, 22, 40, 0.85);
        padding: 50px;
        border-radius: 20px;
        text-align: center;
        max-width: 500px;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
      }

      h1 {
        margin-bottom: 15px;
        font-size: 32px;
        background: linear-gradient(90deg, #4fd1dc, #2b7cff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      p {
        font-size: 15px;
        color: #cfe6ff;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Bug Reported</h1>
      <p>
        Your bug has been reported successfully.<br /><br />
        Thank you for helping us improve the Discord bot! We will review your
        report and work on fixing the issue as soon as possible. If we need more
        information, we may reach out to you via your provided Discord username.
      </p>
    </div>
  </body>
</html>
